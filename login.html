<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novus IP | Client Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            background: var(--bg-primary);
        }
        
        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .auth-toggles {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
        }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
        }
        
        .form-control {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: transparent;
            border-color: var(--brand-indigo);
            box-shadow: none;
            color: var(--text-primary);
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .social-btn {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition-fast);
        }
        
        .social-btn:hover {
            background: var(--bg-secondary);
        }
    </style>
</head>
<body>

    <div class="auth-layout">
        
        <div class="auth-form-side">
            <div class="auth-toggles">
                <button class="icon-btn" id="theme-toggle"><i class="bi bi-moon"></i></button>
                <button class="icon-btn" id="rtl-toggle"><i class="bi bi-text-right"></i></button>
            </div>
            
            <div class="glass-card" data-aos="zoom-in" data-aos-duration="800">
                <a href="index.html" class="logo mb-4 d-block text-center fs-2">
                    <i class="bi bi-shield-check"></i> Novus<span>IP</span>
                </a>
                
                <h4 class="fw-bold mb-1 text-center">Welcome Back</h4>
                <p class="text-secondary text-center mb-4">Sign in to your dashboard</p>
                
                <form action="dashboard.html">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Email Address</label>
                        <input type="email" class="form-control" required placeholder="name@company.com">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Password</label>
                        <div class="position-relative">
                            <input type="password" class="form-control" id="pwd" required placeholder="Enter password">
                            <i class="bi bi-eye password-toggle" id="toggle-pwd"></i>
                        </div>
                    </div>
                    
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check mb-0">
                            <input type="checkbox" class="form-check-input border-secondary" id="remember">
                            <label class="form-check-label text-secondary small" for="remember">Remember me for 30 days</label>
                        </div>
                        <a href="#" class="small text-indigo text-decoration-none">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn-premium primary w-100 border-0 mb-4">Login to Dashboard</button>
                    
                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 border-secondary">
                        <span class="mx-3 text-secondary small">OR CONTINUE WITH</span>
                        <hr class="flex-grow-1 border-secondary">
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <button type="button" class="social-btn">
                                <i class="bi bi-google text-danger"></i> Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="social-btn">
                                <i class="bi bi-apple fs-5"></i> Apple
                            </button>
                        </div>
                    </div>
                    
                    <p class="text-center text-secondary small mb-0">
                        Don't have an account? <a href="signup.html" class="text-indigo fw-bold text-decoration-none">Create Account</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Visibility Toggle
        document.getElementById('toggle-pwd').addEventListener('click', function() {
            const pwdInput = document.getElementById('pwd');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                this.classList.remove('bi-eye');
                this.classList.add('bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                this.classList.remove('bi-eye-slash');
                this.classList.add('bi-eye');
            }
        });
    </script>
</body>
</html>
