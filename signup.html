<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novus IP | Create Client Account</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            background: var(--bg-primary);
        }
        

        
        .auth-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .auth-toggles {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
        }
        
        .premium-card-auth {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
        }
        
        .form-control {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
        }
        
        .form-control:focus {
            background: var(--bg-primary);
            border-color: var(--brand-indigo);
            box-shadow: none;
            color: var(--text-primary);
        }
        
        .social-btn {
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition-fast);
        }
        
        .social-btn:hover {
            border-color: var(--brand-indigo);
            color: var(--brand-indigo);
        }
    </style>
</head>
<body>

    <div class="auth-layout">
        
        <!-- Form Side -->
        <div class="auth-form-side order-lg-1">
            <div class="auth-toggles">
                <button class="icon-btn" id="theme-toggle"><i class="bi bi-moon"></i></button>
                <button class="icon-btn" id="rtl-toggle"><i class="bi bi-text-right"></i></button>
            </div>
            
            <div class="premium-card-auth" data-aos="fade-up" data-aos-duration="800">
                <a href="index.html" class="logo mb-4 d-block text-center fs-2">
                    <i class="bi bi-shield-check"></i> Novus<span>IP</span>
                </a>
                
                <h4 class="fw-bold mb-1 text-center">Create Client Account</h4>
                <p class="text-secondary text-center mb-4">Set up your dashboard access</p>
                
                <form action="dashboard.html">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Full Name</label>
                        <input type="text" class="form-control" required placeholder="John Doe">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Email Address</label>
                        <input type="email" class="form-control" required placeholder="name@company.com">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Password</label>
                        <input type="password" class="form-control" required placeholder="Create password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Confirm Password</label>
                        <input type="password" class="form-control" required placeholder="Confirm password">
                    </div>
                    
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input border-secondary" id="terms" required>
                        <label class="form-check-label text-secondary small" for="terms">I agree to the <a href="#" class="text-indigo text-decoration-none">Terms of Service</a> and <a href="#" class="text-indigo text-decoration-none">Privacy Policy</a></label>
                    </div>
                    
                    <button type="submit" class="btn-premium primary w-100 border-0 mb-4 mt-2">Sign Up</button>
                    
                    <div class="d-flex align-items-center mb-4">
                        <hr class="flex-grow-1 border-secondary">
                        <span class="mx-3 text-secondary small">OR SIGN UP WITH</span>
                        <hr class="flex-grow-1 border-secondary">
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <button type="button" class="social-btn">
                                <i class="bi bi-google text-danger"></i> Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button type="button" class="social-btn">
                                <i class="bi bi-apple fs-5"></i> Apple
                            </button>
                        </div>
                    </div>
                    
                    <p class="text-center text-secondary small mb-0">
                        Already have an account? <a href="login.html" class="text-indigo fw-bold text-decoration-none">Sign In</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
